<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Download App - Vidharthi Store</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      background: linear-gradient(135deg, #4CAF50, #2E7D32);
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      text-align: center;
    }

    .container {
      max-width: 400px;
      padding: 20px;
    }

    .logo {
      font-size: 28px;
      font-weight: bold;
      margin-bottom: 15px;
    }

    .tagline {
      font-size: 16px;
      margin-bottom: 30px;
      opacity: 0.9;
    }

    .btn {
      display: block;
      width: 100%;
      padding: 14px;
      margin: 10px 0;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      cursor: pointer;
      text-decoration: none;
      transition: 0.3s;
    }

    .playstore {
      background: #ffffff;
      color: #333;
    }

    .apk {
      background: #000000;
      color: #fff;
    }

    .btn:hover {
      transform: scale(1.05);
      opacity: 0.9;
    }

    .footer {
      margin-top: 25px;
      font-size: 12px;
      opacity: 0.8;
    }

    .footer a {
      color: #fff;
      text-decoration: underline;
    }
  </style>
</head>
<body>

  <div class="container">
    <div class="logo">📱 Vidharthi Store</div>

    <div class="tagline">
      Download our app for the best shopping experience
    </div>

    <!-- Play Store Button -->
    <a href="https://play.google.com/store/apps/details?id=YOUR_APP_ID" class="btn playstore">
      🚀 Download from Play Store
    </a>

    <!-- APK Download Button -->
    <a href="https://yourwebsite.com/app.apk" class="btn apk">
      ⬇️ Download APK
    </a>

    <div class="footer">
      <a href="privacy_policy.html">Privacy Policy</a>
    </div>
  </div>

</body>
</html>
